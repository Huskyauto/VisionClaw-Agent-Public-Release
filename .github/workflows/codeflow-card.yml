name: CodeFlow Card

# Auto-updating health/scale/structure SVG card on the README. Recomputed by
# braedonsaunders/codeflow on every push to main + monthly so the activity
# heatmap stays current even during quiet weeks. Pinned to commit SHA — DO NOT
# bump to a moving tag without re-vetting the action.

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/codeflow-card.svg'
      - '.github/codeflow-card.json'
  schedule:
    - cron: '0 7 1 * *'  # 1st of each month, 07:00 UTC
  workflow_dispatch:

concurrency:
  group: codeflow-card-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # commit the regenerated SVG + state JSON; nothing else

jobs:
  card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      # SHA pinned to v1 (b44ab39f, 2026-05-03). Re-vet before bumping.
      - uses: braedonsaunders/codeflow/card@b44ab39f646dba95b90db16eef37c84c9d2113ac
        with:
          style: compact
          theme: auto
          accent: purple
          show-grade: 'false'
          show-score: 'false'
          receipts: 'false'
          pin: 'true'
